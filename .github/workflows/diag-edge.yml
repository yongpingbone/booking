name: 診斷 sync-control Edge Function

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 呼叫並存結果
        run: |
          {
            echo "=== 沒帶 Authorization(預期 401) ==="
            curl -sS -w "\nHTTP:%{http_code}\n" -X POST https://ikzyzkhuireqztbhrtna.supabase.co/functions/v1/sync-control \
              -H "Content-Type: application/json" -d '{"action":"get-status"}'
          } > /tmp/diag.txt
          cat /tmp/diag.txt
      - name: 存回 repo
        if: always()
        run: |
          mkdir -p sheet-sync-worker/.debug
          cp /tmp/diag.txt sheet-sync-worker/.debug/edge-diag.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sheet-sync-worker/.debug/edge-diag.txt
          git diff --cached --quiet || git commit -m "chore: edge function 診斷結果(自動)"
          git push || true
