name: 觸發 Sheet 同步 Worker

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: '要呼叫哪個功能'
        required: true
        default: 'sync'
        type: choice
        options:
          - sync
          - sync-full-scope
          - reconcile-month
          - debug-invalid-records
          - debug-inspect-cell
      weekKey:
        description: '[sync 用] 週一日期(YYYY-MM-DD)，留空 = 當週'
        required: false
        type: string
      year:
        description: '[reconcile-month 用] 年份，例如 2026'
        required: false
        type: string
      month:
        description: '[reconcile-month 用] 月份 1-12'
        required: false
        type: string
      dryRun:
        description: '[reconcile-month 用] 勾選 = 只乾跑不真的執行'
        required: false
        default: true
        type: boolean
      forceNoteRecheck:
        description: '[sync-full-scope 用] 勾選 = 強制重新檢查所有已同步記錄的備註狀態(一次性修復用)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 呼叫 Worker 並顯示結果
        env:
          INTERNAL_SYNC_SECRET: ${{ secrets.INTERNAL_SYNC_SECRET }}
        run: |
          set -e
          if [ -z "$INTERNAL_SYNC_SECRET" ]; then
            echo "::error::缺少 INTERNAL_SYNC_SECRET 這把 repository secret"
            exit 1
          fi

          METHOD="POST"

          if [ "${{ inputs.endpoint }}" = "sync" ]; then
            URL="https://yongping-sheet-sync.yihanhsu123.workers.dev/sync"
            if [ -n "${{ inputs.weekKey }}" ]; then
              BODY='{"weekKey": "${{ inputs.weekKey }}"}'
            else
              BODY='{}'
            fi
          elif [ "${{ inputs.endpoint }}" = "sync-full-scope" ]; then
            # 立即補跑目前完整的上/當/下三個月範圍，內部自己算 weekKeys，
            # 不用在這裡列出來。跟排程用的是同一套範圍邏輯。
            URL="https://yongping-sheet-sync.yihanhsu123.workers.dev/sync"
            BODY='{"scope": "current", "forceNoteRecheck": ${{ inputs.forceNoteRecheck }}}'
          elif [ "${{ inputs.endpoint }}" = "debug-invalid-records" ]; then
            # 診斷用，列出目前還卡在失敗狀態的記錄跟原因，不用改資料。
            URL="https://yongping-sheet-sync.yihanhsu123.workers.dev/debug/invalid-records"
            METHOD="GET"
            BODY=""
          elif [ "${{ inputs.endpoint }}" = "debug-inspect-cell" ]; then
            # 診斷用，直接讀某一格實際的備註內容，順便嘗試清除、清除後馬上
            # 再讀一次。目前固定查 7月-麒 2026-07-09 14:00 這格(Kelie)，
            # 之後如果要查別格，改這裡的 query string 即可。
            URL="https://yongping-sheet-sync.yihanhsu123.workers.dev/debug/inspect-cell?date=2026-07-09&startTime=14:00&sheetMasterLabel=%E9%BA%92&clear=true"
            METHOD="GET"
            BODY=""
          else
            URL="https://yongping-sheet-sync.yihanhsu123.workers.dev/reconcile-month"
            BODY='{"year": ${{ inputs.year }}, "month": ${{ inputs.month }}, "dryRun": ${{ inputs.dryRun }}}'
          fi

          echo "$METHOD $URL"
          [ -n "$BODY" ] && echo "body: $BODY"
          echo "---"

          if [ "$METHOD" = "GET" ]; then
            curl -sS -X GET "$URL" \
              -H "X-Internal-Secret: $INTERNAL_SYNC_SECRET" \
              -w "\nHTTP status: %{http_code}\n" \
              -o response.json
          else
            curl -sS -X POST "$URL" \
              -H "X-Internal-Secret: $INTERNAL_SYNC_SECRET" \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              -w "\nHTTP status: %{http_code}\n" \
              -o response.json
          fi

          echo "---"
          cat response.json | jq . || cat response.json

      - name: 把結果存回 repo(Claude 看不到 Actions log 內容，用這個方式讓它讀得到)
        run: |
          mkdir -p sheet-sync-worker/.debug
          cp response.json sheet-sync-worker/.debug/last-run-response.json
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sheet-sync-worker/.debug/last-run-response.json
          git diff --cached --quiet || git commit -m "chore: 更新 debug 執行結果(自動)"
          git push
