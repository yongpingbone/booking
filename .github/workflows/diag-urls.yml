name: 診斷 manifest/icon URL

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 檢查各種可能的網址並存結果
        run: |
          {
            echo "=== Netlify manifest ==="
            curl -sS -o /dev/null -w "%{http_code}\n" https://yongpingbone.netlify.app/manifest.json
            echo "=== Netlify icon(帶 /booking/) ==="
            curl -sS -o /dev/null -w "%{http_code}\n" https://yongpingbone.netlify.app/booking/icon-512.png
            echo "=== Netlify icon(不帶 /booking/) ==="
            curl -sS -o /dev/null -w "%{http_code}\n" https://yongpingbone.netlify.app/icon-512.png
            echo "=== Netlify 根目錄列出 ==="
            curl -sS https://yongpingbone.netlify.app/ | head -c 500
            echo ""
            echo "=== GitHub Pages manifest ==="
            curl -sS -o /dev/null -w "%{http_code}\n" https://yongpingbone.github.io/booking/manifest.json
            echo "=== GitHub Pages icon ==="
            curl -sS -o /dev/null -w "%{http_code}\n" https://yongpingbone.github.io/booking/icon-512.png
          } > /tmp/diag-result.txt
          cat /tmp/diag-result.txt
      - name: 存回 repo
        if: always()
        run: |
          mkdir -p sheet-sync-worker/.debug
          cp /tmp/diag-result.txt sheet-sync-worker/.debug/url-diag.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sheet-sync-worker/.debug/url-diag.txt
          git diff --cached --quiet || git commit -m "chore: 更新網址診斷結果(自動)"
          git push || true
