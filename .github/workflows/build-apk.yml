name: Build PWA APK

on:
  push:
    branches: [ main ]
    paths:
      - 'apk-project/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: 預先寫好 Bubblewrap 設定檔(build 這步也需要，不是只有 init 需要)
        run: |
          SDK_PATH="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"$JAVA_HOME\", \"androidSdkPath\": \"$SDK_PATH\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: 產生 Android 專案 + 簽章金鑰(完全不透過互動精靈)
        # twa-manifest.json 是預先產生好、存在 apk-project/ 底下的檔案，
        # 不是這裡才產生的——用 @bubblewrap/core 的底層 API 直接呼叫，
        # 完全繞過 Bubblewrap CLI 的互動式精靈(那個精靈在自動化環境下
        # 有很多難以完全掌握的重繪/時機問題，反覆試過七八輪都還有新的
        # 邊界情況，改成這個方式一次到位)。
        # 簽章金鑰(android.keystore)如果 repo 裡已經有(下一步驟會存進去)
        # 就直接沿用，不會每次重新產生——固定金鑰是之後能夠正常更新 App
        # (而不是每次都要使用者移除舊版重裝)的前提。
        run: |
          cd apk-project
          npm install --no-save @bubblewrap/core
          node generate.js

      - name: 把簽章金鑰存回 repo(只有第一次產生時才會真的有變化要 commit)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apk-project/android.keystore
          git diff --cached --quiet || git commit -m "chore: 存入固定的 APK 簽章金鑰(自動，只會發生一次)"
          git push || true

      - name: Build APK
        run: |
          cd apk-project
          set -o pipefail
          bubblewrap build --skipPwaValidation 2>&1 | tee build-log.txt
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true
          BUBBLEWRAP_KEYSTORE_PASSWORD: pass1234
          BUBBLEWRAP_KEY_PASSWORD: pass1234

      # bubblewrap build 這個指令本來就會同時產生apk跟aab(build.ts原始碼裡
      # 兩個輸出檔名都寫死了)，這步只是確認兩個檔案真的都在，不是額外建置。
      - name: 確認 build 同時產出 APK 跟 AAB
        run: |
          cd apk-project
          echo "=== apk-project 目錄內容 ==="
          ls -la *.apk *.aab 2>&1 || true
          test -f app-release-signed.apk || { echo "::error::找不到 app-release-signed.apk"; exit 1; }
          test -f app-release-bundle.aab || { echo "::error::找不到 app-release-bundle.aab"; exit 1; }
          echo "兩個檔案都確認存在"

      - name: 發布成 GitHub Release(永久保存，網址固定不會過期)
        # 用固定的 tag(latest-apk)，每次都覆蓋同一個 Release，網址永遠
        # 一樣，不會像 Artifact 一樣最多只能留到 400 天就消失。
        # 2026-07-13新增：.aab也一起發布——這個檔案bubblewrap build本來
        # 就會產生(跟apk同一次build指令的輸出)，之前只是沒有把它存下來，
        # 不是要另外多跑一次建置。.aab是要上傳Google Play Console用的，
        # .apk維持給直接側載安裝用，兩個檔案用途不同、都留著。
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd apk-project
          NOTES="自動打包產生，隨時可能更新。

          app-release-signed.apk：直接側載安裝用(僅支援 Android)
          app-release-bundle.aab：要上傳到 Google Play Console 才用這個，不是給手機直接安裝的

          打包時間：$(date -u '+%Y-%m-%d %H:%M UTC')"
          gh release delete latest-apk --yes --cleanup-tag || true
          gh release create latest-apk app-release-signed.apk app-release-bundle.aab \
            --title "永平整復保健 App(自動打包)" \
            --notes "$NOTES"

      - name: 把 build log 存回 repo 供除錯用(不管成功失敗都存)
        if: always()
        run: |
          mkdir -p sheet-sync-worker/.debug
          {
            echo "=== build-log.txt ==="
            cat apk-project/build-log.txt 2>/dev/null || echo "(不存在)"
          } > sheet-sync-worker/.debug/apk-build-log.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sheet-sync-worker/.debug/apk-build-log.txt
          git diff --cached --quiet || git commit -m "chore: 更新 APK build log(自動)"
          git push || true
