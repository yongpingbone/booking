name: Build PWA APK

on:
  push:
    branches: [ main ]
    paths:
      - 'apk-project/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: 預先寫好 Bubblewrap 設定檔(build 這步也需要，不是只有 init 需要)
        run: |
          SDK_PATH="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"$JAVA_HOME\", \"androidSdkPath\": \"$SDK_PATH\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: 產生 Android 專案 + 簽章金鑰(完全不透過互動精靈)
        # twa-manifest.json 是預先產生好、存在 apk-project/ 底下的檔案，
        # 不是這裡才產生的——用 @bubblewrap/core 的底層 API 直接呼叫，
        # 完全繞過 Bubblewrap CLI 的互動式精靈(那個精靈在自動化環境下
        # 有很多難以完全掌握的重繪/時機問題，反覆試過七八輪都還有新的
        # 邊界情況，改成這個方式一次到位)。
        run: |
          cd apk-project
          npm install --no-save @bubblewrap/core
          node generate.js

      - name: Build APK
        run: |
          cd apk-project
          set -o pipefail
          bubblewrap build --skipPwaValidation 2>&1 | tee build-log.txt
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true
          BUBBLEWRAP_KEYSTORE_PASSWORD: pass1234
          BUBBLEWRAP_KEY_PASSWORD: pass1234

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yongping-app
          path: apk-project/app-release-signed.apk
          retention-days: 30

      - name: 把 build log 存回 repo 供除錯用(不管成功失敗都存)
        if: always()
        run: |
          mkdir -p sheet-sync-worker/.debug
          {
            echo "=== build-log.txt ==="
            cat apk-project/build-log.txt 2>/dev/null || echo "(不存在)"
          } > sheet-sync-worker/.debug/apk-build-log.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sheet-sync-worker/.debug/apk-build-log.txt
          git diff --cached --quiet || git commit -m "chore: 更新 APK build log(自動)"
          git push || true
