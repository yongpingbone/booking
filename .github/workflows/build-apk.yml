name: Build PWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Expect (Auto-responder)
        run: sudo apt-get install -y expect

      - name: 預先寫好 Bubblewrap 設定檔，跳過新版多出來的 JDK/Android SDK 安裝詢問
        # 追查發現：新版 Bubblewrap CLI 第一次執行時會多問「要不要自動安裝
        # JDK」「要不要自動安裝 Android SDK」這兩題(舊版沒有)，原本的 expect
        # 腳本沒有處理這兩題的邏輯，會卡住等一個不會出現的比對結果。
        # 與其繼續用容易再故障的方式去猜新提示文字，直接讀 Bubblewrap 原始碼
        # (~/.bubblewrap/config.json，欄位是 jdkPath/androidSdkPath)確認：
        # 只要這個設定檔已經有值，就完全不會問這兩題，直接跳到 init 指令
        # 自己的提示(這部分維持用原本的 expect 處理)。
        # ANDROID_HOME 有些版本的 setup-android action 不會自動設定，備援
        # 用 ANDROID_SDK_ROOT，兩個都印出來方便萬一還是不對時直接看真實值。
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          SDK_PATH="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"$JAVA_HOME\", \"androidSdkPath\": \"$SDK_PATH\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Init Bubblewrap
        run: |
          mkdir apk-build && cd apk-build
          set -o pipefail
          expect -c '
          exp_internal 1
          set timeout 60
          spawn bubblewrap init --manifest https://yongpingbone.github.io/booking/manifest.json --directory .

          # 第一階段(迴圈)：處理順序不固定、可能出現 0~N 次的題目——
          # JDK/SDK 安裝詢問(理論上設定檔已經跳過，這裡是防呆)、Web app
          # details 精靈的各欄位(用 regex 統一接受預設值)、方向鍵選單。
          # 遇到 "*correct*"(精靈跑完、要求確認整體內容)就跳出迴圈，
          # 進入第二階段。
          expect {
            "*install the JDK*"     { send "n\r"; exp_continue }
            "*Path to your existing JDK*" { send "$env(JAVA_HOME)\r"; exp_continue }
            "*install the Android*" { send "n\r"; exp_continue }
            "*Path to the Android*" { send "$env(ANDROID_HOME)\r"; exp_continue }
            "*Use arrow keys*" { send "\r"; exp_continue }
            -re {\([^\r\n)]*\)[ \t]} { send "\r"; exp_continue }
            "*correct*" { send "y\r" }
            timeout { send_error "\n>>> INIT_TIMEOUT(第一階段)，目前緩衝內容如上 <<<\n"; exit 1 }
          }

          # 第二階段(依序、各自獨立)：keystore 相關欄位嚴格照順序、只會
          # 出現一次——不能用迴圈處理，因為這幾題的提示文字互相是子字串
          # 關係(例如 "Organization" 是 "Organizational Unit" 的子字串)，
          # 用同一個累積中的 buffer 跑迴圈時，舊的已回答內容還留在 buffer
          # 裡，會被後面的題目誤重複比對到，導致答案送錯欄位(實測發生過：
          # Country Code 收到 Organizational Unit 的答案，無限重複卡住)。
          # 各自獨立的 expect 呼叫，每叫一次就消費掉對應的 buffer，不會有
          # 這個問題。
          # 注意：「Do you want to create one now? (Y/n)」不在這裡處理——
          # 這題的格式跟第一階段那條「(預設值) 後面接空白」的 regex 剛好
          # 也對得上(Y/n 也是括號)，實測發現它會在第一階段就被接走，如果
          # 這裡也保留對應的 expect，反而會因為第一階段已經吃掉這段內容、
          # 這裡永遠等不到而卡住。直接從「First and Last names」開始接。
          expect {
            "*First and Last names*" { send "Yongping\r" }
            timeout { send_error "\n>>> TIMEOUT at names <<<\n"; exit 1 }
          }
          expect {
            "*Organizational Unit*" { send "Health\r" }
            timeout { send_error "\n>>> TIMEOUT at org unit <<<\n"; exit 1 }
          }
          expect {
            "*Organization*" { send "Health\r" }
            timeout { send_error "\n>>> TIMEOUT at org <<<\n"; exit 1 }
          }
          expect {
            "*Locality*" { send "Taipei\r" }
            timeout { send_error "\n>>> TIMEOUT at locality <<<\n"; exit 1 }
          }
          expect {
            "*Province*" { send "TW\r" }
            timeout { send_error "\n>>> TIMEOUT at province <<<\n"; exit 1 }
          }
          expect {
            "*Country Code*" { send "TW\r" }
            timeout { send_error "\n>>> TIMEOUT at country code <<<\n"; exit 1 }
          }
          expect {
            "*Keystore password*" { send "pass1234\r" }
            timeout { send_error "\n>>> TIMEOUT at keystore password <<<\n"; exit 1 }
          }
          expect {
            "*Key password*" { send "pass1234\r" }
            timeout { send_error "\n>>> TIMEOUT at key password <<<\n"; exit 1 }
          }
          expect eof
          ' 2>&1 | tee init-log.txt
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Build APK
        run: |
          cd apk-build
          set -o pipefail
          bubblewrap build --skipPwaValidation --keyPassword pass1234 --keystorePassword pass1234 2>&1 | tee build-log.txt
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yongping-app
          path: apk-build/app-release-signed.apk
          retention-days: 30

      - name: 把 build log 存回 repo 供除錯用(不管成功失敗都存)
        if: always()
        run: |
          mkdir -p sheet-sync-worker/.debug
          {
            echo "=== init-log.txt ==="
            cat apk-build/init-log.txt 2>/dev/null || echo "(不存在)"
            echo ""
            echo "=== build-log.txt ==="
            cat apk-build/build-log.txt 2>/dev/null || echo "(不存在)"
          } > sheet-sync-worker/.debug/apk-build-log.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sheet-sync-worker/.debug/apk-build-log.txt
          git diff --cached --quiet || git commit -m "chore: 更新 APK build log(自動)"
          git push || true
