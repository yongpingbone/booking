name: Build PWA APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Expect (Auto-responder)
        run: sudo apt-get install -y expect

      - name: Init Bubblewrap
        run: |
          mkdir apk-build && cd apk-build
          expect -c '
          set timeout 120
          spawn bubblewrap init --manifest https://yongpingbone.netlify.app/manifest.json --directory .
          expect "*correct*" { send "y\r" }
          expect "*create one now*" { send "Yes\r" }
          expect "*First and Last names*" { send "Yongping\r" }
          expect "*Organizational Unit*" { send "Health\r" }
          expect "*Organization*" { send "Health\r" }
          expect "*Locality*" { send "Taipei\r" }
          expect "*Province*" { send "TW\r" }
          expect "*Country Code*" { send "TW\r" }
          expect "*Keystore password*" { send "pass1234\r" }
          expect "*Key password*" { send "pass1234\r" }
          expect eof
          ' | tee init-log.txt
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Build APK
        run: |
          cd apk-build
          set -o pipefail
          bubblewrap build --skipPwaValidation --keyPassword pass1234 --keystorePassword pass1234 2>&1 | tee build-log.txt
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yongping-app
          path: apk-build/app-release-signed.apk
          retention-days: 30

      - name: 把 build log 存回 repo 供除錯用(不管成功失敗都存)
        if: always()
        run: |
          mkdir -p sheet-sync-worker/.debug
          {
            echo "=== init-log.txt ==="
            cat apk-build/init-log.txt 2>/dev/null || echo "(不存在)"
            echo ""
            echo "=== build-log.txt ==="
            cat apk-build/build-log.txt 2>/dev/null || echo "(不存在)"
          } > sheet-sync-worker/.debug/apk-build-log.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sheet-sync-worker/.debug/apk-build-log.txt
          git diff --cached --quiet || git commit -m "chore: 更新 APK build log(自動)"
          git push || true
