// 推播 LINE 給客人（透過 Edge Function，token 由後端保管）
async function pushLineToCustomer(userId, text) {
  if (!userId || String(userId).startsWith("__")) return { ok: false, reason: "no_line_binding" };
  try {
    let { data: { session } } = await sb.auth.getSession();
    if (!session?.access_token) {
      // session過期不是罕見狀況——師傅端瀏覽器開著沒操作一段時間就會發生。
      // 之前這裡一偵測到空token就直接放棄，導致「確認/核准取消」這些動作
      // 資料庫都成功寫入，但通知客人這一步完全靜默失敗，師傅完全不會發現，
      // 客人也完全不知道自己的預約狀態已經變了。這裡先主動刷新一次session
      // 再重試，大部分情況都能救回來，不用等使用者自己重新整理頁面。
      const { data: refreshed } = await sb.auth.refreshSession();
      session = refreshed?.session;
    }
    if (!session?.access_token) {
      console.error("[推播客人] session無法取得，通知未送出");
      return { ok: false, reason: "no_session" };
    }
    const r = await fetch("https://ikzyzkhuireqztbhrtna.supabase.co/functions/v1/notify-line-push", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${session.access_token}`
      },
      body: JSON.stringify({ customerLineId: userId, messageText: text })
    });
    const j = await r.json().catch(() => ({}));
    if (!j.success) {
      console.error("[推播客人] 失敗:", j.error);
      return { ok: false, reason: j.error || "unknown" };
    }
    return { ok: true };
  } catch (e) {
    console.error("推播失敗", e);
    return { ok: false, reason: String(e?.message || e) };
  }
}

// 逾時未確認自動釋放（前端保險，主力仍是 Supabase pg_cron）
async function sweepExpiredAwaiting() {
  try {
    const nowIso = new Date().toISOString();
    const { data } = await sb.from("bookings")
      .select("id,note")
      .eq("status", "awaiting_customer")
      .lt("confirm_deadline", nowIso);
    if (!data || !data.length) return;
    for (const b of data) {
      await sb.from("bookings").update({
        status: "cancelled",
        note: (b.note ? b.note + "　" : "") + "（逾時未確認，自動釋放）",
        last_edited_at: nowIso
      }).eq("id", b.id).eq("status", "awaiting_customer");
    }
  } catch (e) { /* 靜默：pg_cron 會兜底 */ }
}
// 開啟後延遲掃一次（等 auth session 還原），之後每 5 分鐘掃一次

// ═══════════════════════════════════════════
// 全域 Realtime：監聽 bookings 表任何變動 → 觸發各視圖 reload

// 這裡收到 DB 變動就 dispatch 該事件，讓它們自動重新載入。
// debounce 300ms：多筆同時變動（如多人預約、批次操作）只 reload 一次。
// ═══════════════════════════════════════════
let __bkReloadTimer = null;
function __triggerBookingsReload(payload) {
  if (__bkReloadTimer) clearTimeout(__bkReloadTimer);
  __bkReloadTimer = setTimeout(() => {
    __bkReloadTimer = null;
    try {
      window.dispatchEvent(new CustomEvent("yp:bookings_changed", {
        detail: {
          realtime: true,
          payload
        }
      }));
    } catch (_) {}
  }, 300);
}
try {
  sb.channel("staff-bookings-realtime").on("postgres_changes", {
    event: "*",
    schema: "public",
    table: "bookings"
  }, payload => {
    __triggerBookingsReload(payload);
  }).subscribe(status => {
    console.log("[Realtime] bookings 訂閱狀態:", status);
  });
} catch (e) {

// ═══════════════════════════════════════════
// 全域彈窗 stack — 給「左滑返回」優先關彈窗用
// 每個彈窗用 useModalBackClose hook 註冊自己的 close 函數
// 左滑（popstate）時先呼叫 stack 最上層的 close，沒彈窗才回上一個 tab
// ═══════════════════════════════════════════
const __modalStack = [];
function pushModal(closeFn) {
  __modalStack.push(closeFn);
}
function popModal(closeFn) {
  const i = __modalStack.lastIndexOf(closeFn);
  if (i >= 0) __modalStack.splice(i, 1);
}
function tryCloseTopModal() {
  if (__modalStack.length === 0) return false;
  const closeFn = __modalStack.pop();
  try {
    closeFn();
  } catch (e) {
    console.warn(e);
  }
  return true;
}
// hook：彈窗開啟時呼叫，傳入 isOpen + onClose
function useModalBackClose(isOpen, onClose) {
  React.useEffect(() => {
    if (!isOpen) return;
    pushModal(onClose);
    return () => popModal(onClose);
  }, [isOpen, onClose]);
}

// visualViewport tracking 已移除（鍵盤升起時造成 modal 位置錯亂）

function getTaipeiNow() {
  const t = new Date();
  const s = t.toLocaleString("en-US", {
    timeZone: "Asia/Taipei",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false
  });
  const [date, time] = s.split(", ");
  const [mo, dy, yr] = date.split("/");
  const [h, mi, sc] = (time || "00:00:00").split(":");
  return new Date(+yr, +mo - 1, +dy, +h, +mi, +sc);
}
function getTaipeiDateStr() {
  const t = getTaipeiNow();
  return `${t.getFullYear()}-${String(t.getMonth() + 1).padStart(2, "0")}-${String(t.getDate()).padStart(2, "0")}`;
}
function fmtDate(y, m, d) {
  return `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
}

// 計算重複預約的所有日期
// startDateStr: "YYYY-MM-DD"
// recurType: "weekly" | "biweekly" | "monthly" (= 每月第N個週幾)
// endType: "count" | "date"
// endValue: count(數字) 或 date("YYYY-MM-DD")
// 回傳日期字串陣列（包含起始日）
function computeRecurDates(startDateStr, recurType, endType, endValue) {
  const dates = [startDateStr];
  if (recurType === "none" || !recurType) return dates;
  const start = new Date(startDateStr + "T00:00:00");
  const MAX = 200;

  // 「每月第N個週幾」需要先算出起始日是「第幾個週幾」
  let monthlyNth = null,
    monthlyDow = null;
  if (recurType === "monthly") {
    monthlyDow = start.getDay(); // 0=週日, 1=週一...
    // 算出起始日是該月第幾個 dow
    monthlyNth = Math.ceil(start.getDate() / 7);
  }

  // 取得「某年某月第N個週幾」的日期，找不到回傳 null
  const getNthWeekday = (year, month, nth, dow) => {
    // month 0-indexed
    const firstDay = new Date(year, month, 1);
    const firstDow = firstDay.getDay();
    let offset = (dow - firstDow + 7) % 7; // 第一個 dow 是幾號-1
    const day = 1 + offset + (nth - 1) * 7;
    // 檢查是否仍在該月
    const result = new Date(year, month, day);
    if (result.getMonth() !== month) return null;
    return result;
  };
  let cur = new Date(start);
  for (let i = 0; i < MAX; i++) {
    if (recurType === "weekly") {
      cur.setDate(cur.getDate() + 7);
    } else if (recurType === "biweekly") {
      cur.setDate(cur.getDate() + 14);
    } else if (recurType === "monthly") {
      // 找下個月的「第 monthlyNth 個 monthlyDow」
      let y = cur.getFullYear(),
        m = cur.getMonth() + 1;
      if (m > 11) {
        m = 0;
        y++;
      }
      let attempts = 0;
      let next = null;
      while (!next && attempts < 24) {
        next = getNthWeekday(y, m, monthlyNth, monthlyDow);
        if (!next) {
          // 該月沒有第N個週X → 跳到下個月再找
          m++;
          if (m > 11) {
            m = 0;
            y++;
          }
          attempts++;
        }
      }
      if (!next) break;
      cur = next;
    } else break;
    const ds = `${cur.getFullYear()}-${String(cur.getMonth() + 1).padStart(2, "0")}-${String(cur.getDate()).padStart(2, "0")}`;
    if (endType === "count") {
      if (dates.length >= parseInt(endValue)) break;
      dates.push(ds);
    } else {
      // date
      if (ds > endValue) break;
      dates.push(ds);
    }
  }
  return dates;
}

// 取得「該日是該月第幾個週幾」的描述
function describeMonthlyNth(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const nth = Math.ceil(d.getDate() / 7);
  const dows = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
  const nths = ["第一個", "第二個", "第三個", "第四個", "第五個"];
  return `${nths[nth - 1] || `第${nth}個`}${dows[d.getDay()]}`;
}
const TPE_NOW = getTaipeiNow();
const DYNAMIC_YEARS = [TPE_NOW.getFullYear() - 1, TPE_NOW.getFullYear(), TPE_NOW.getFullYear() + 1];
const TIMES = [];
for (let h = 8; h <= 22; h++) {
  TIMES.push(`${String(h).padStart(2, "0")}:00`);
  if (h < 22) TIMES.push(`${String(h).padStart(2, "0")}:30`);
}
TIMES.push("22:30");
const DEFAULT_REST = ["08:00", "12:00", "12:30", "13:00", "13:30", "18:00", "18:30"];

// ── 休息時段（每位師傅各自一組，存於 master_rest_times 表）──
// REST_BY_MASTER: { master_id: Set(times) }  給總覽視圖用
// REST:           當前登入師傅的休息集合（相容個人視圖既有代碼）
// localStorage 僅作載入前 / 離線的快取 fallback
const REST_BY_MASTER = {};
let __currentMasterId = null;
function _restCacheKey(mid) {
  return "rest_times_" + (mid || "default");
}
function loadRestCache(mid) {
  try {
    const s = localStorage.getItem(_restCacheKey(mid));
    if (s) return new Set(JSON.parse(s));
    // 舊版單一鍵相容：首次遷移時沿用舊 rest_times
    const legacy = localStorage.getItem("rest_times");
    if (legacy) return new Set(JSON.parse(legacy));
  } catch (e) {}
  return new Set(DEFAULT_REST);
}
function saveRestCache(mid, set) {
  try {
    localStorage.setItem(_restCacheKey(mid), JSON.stringify([...set]));
  } catch (e) {}
}

// 取得某師傅的休息集合（總覽視圖用）；沒載到就用快取/預設
function restOf(mid) {
  if (REST_BY_MASTER[mid]) return REST_BY_MASTER[mid];
  const c = loadRestCache(mid);
  REST_BY_MASTER[mid] = c;
  return c;
}

// 從資料庫載入所有師傅的休息時段，填入 REST_BY_MASTER，並設定當前師傅的 REST
async function loadAllRestTimes(currentMasterId) {
  __currentMasterId = currentMasterId || __currentMasterId;
  try {
    const {
      data,
      error
    } = await sb.from("master_rest_times").select("master_id,rest_times");
    if (!error && data) {
      data.forEach(r => {
        const set = new Set(Array.isArray(r.rest_times) ? r.rest_times : []);
        REST_BY_MASTER[r.master_id] = set;
        saveRestCache(r.master_id, set);
      });
    }
  } catch (e) {
    console.warn("[rest] 載入失敗，用快取:", e);
  }
  if (__currentMasterId) {
    REST = REST_BY_MASTER[__currentMasterId] || loadRestCache(__currentMasterId);
  }
  return REST;
}

// 儲存某師傅的休息時段到資料庫（+更新記憶體與快取）
async function saveRestTimes(mid, set) {
  const arr = [...set];
  REST_BY_MASTER[mid] = new Set(arr);
  saveRestCache(mid, new Set(arr));
  if (mid === __currentMasterId) REST = REST_BY_MASTER[mid];
  try {
    const {
      error
    } = await sb.from("master_rest_times").upsert({
      master_id: mid,
      rest_times: arr,
      updated_at: new Date().toISOString()
    }, {
      onConflict: "master_id"
    });
    if (error) {
      console.warn("[rest] 儲存失敗:", error);
      return false;
    }
    return true;
  } catch (e) {
    console.warn("[rest] 儲存例外:", e);
    return false;
  }
}

// 當前登入師傅的休息集合（初始用預設，登入後由 loadAllRestTimes 覆蓋）

const DAYS = ["一", "二", "三", "四", "五", "六", "日"];
const ALL_DAYS_OV = ["日", "一", "二", "三", "四", "五", "六"];

// 系統預設名字 — 當使用者選色標但沒輸入名字時，系統會自動填這些字
const COLOR_DEFAULT_NAMES = {

    let g = document.createElement("div");
    g.id = "drag-ghost";
    g.textContent = name;
    Object.assign(g.style, {
      position: "fixed",
      left: x + "px",
      top: y + "px",
      transform: "translate(-50%,-130%)",
      pointerEvents: "none",
      zIndex: "9999",
      background: "#74b9ff",
      border: "2px solid #fff",
      borderRadius: "8px",
      padding: "5px 12px",
      color: "#fff",
      fontWeight: "700",
      fontSize: "13px",
      boxShadow: "0 4px 16px rgba(0,0,0,0.4)",
      whiteSpace: "nowrap",
      transition: "none"
    });
    document.body.appendChild(g);
    ghostRef.current = g;
  };
  const moveGhost = (x, y) => {
    if (!ghostRef.current) return;
    ghostRef.current.style.left = x + "px";
    ghostRef.current.style.top = y + "px";
  };
  const removeGhost = () => {

      x: t.clientX,
      y: t.clientY
    };

  const handleGlobalTouchMove = e => {
    const t = e.touches[0];

      e.preventDefault();

      // 用 ref 記錄目標格，不觸發 re-render
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const td = el?.closest("td[data-cellkey]");
      dragOverRef.current = td?.dataset.cellkey || null;
      // 高亮目標格（直接操作 DOM，零 re-render）
      document.querySelectorAll("td[data-cellkey].drag-over-active").forEach(x => {
        x.classList.remove("drag-over-active");

      });
      if (td) {
        td.classList.add("drag-over-active");
        td.style.outline = "2px solid #74b9ff";
      }
      return;
    }
    if (touchStartPos.current) {
      const dx = Math.abs(t.clientX - touchStartPos.current.x);
      const dy = Math.abs(t.clientY - touchStartPos.current.y);
      if (dx > 14 || dy > 14) {
        clearTimeout(longPressTimer.current);
        touchStartPos.current = null;

    }
  };

  // ⚡ 最近空檔：往後最多找 60 天，找出目前選定師傅最早的空格，跳過去
  // （統一只用月曆顯示，不再切到週檢視——直接在月曆裡捲到對應那一週即可）
  const jumpToDate = (dateStr, highlightTime) => {
    const [y, m, d] = dateStr.split("-").map(Number);
    setYear(y);
    setMonth(m - 1);
    // 水平捲動位置要一起重置，不然「時間」欄位固定住之後，底下的欄位
    // 如果還停在跳轉前的舊捲動位置，兩者對不齊，會出現欄位被切成一小條、
    // 內容擠在一起看起來像重疊的畫面。
    if (scrollContainerRef.current) scrollContainerRef.current.scrollLeft = 0;
    setTimeout(() => {
      // 防護：這個延遲執行的時候，使用者可能已經切到別的分頁了，
      // 排班表本身如果不在畫面上（tab不是schedule），就不要再繼續動這裡的DOM/狀態，
      // 避免操作到過期節點或留下非預期的殘留狀態。
      if (tab !== "schedule") return;
      const wks = showSun === "1" ? getWeeksSun(y, m - 1) : getWeeksMon(y, m - 1, false);
      const idx = wks.findIndex(wk => wk.includes(d));
      if (idx >= 0) setWeekIdx(idx);
      setTimeout(() => {
        if (tab !== "schedule") return;
        if (scrollContainerRef.current) scrollContainerRef.current.scrollLeft = 0;
        if (!highlightTime) return;
        // 月曆一次會顯示好幾週，同一個時間（例如 14:00）在每一週都會有一列，
        // 不能只用文字比對「開頭是不是 14:00」，那樣會抓到別週同一時間的列，
        // 改用 data-cellkey（日期+時間組成、每一格獨一無二）精準定位到正確格子。
        const container = scrollContainerRef.current;
        if (!container) return;
        const tds = container.querySelectorAll("td[data-cellkey]");
        const target = [...tds].find(td => td.dataset.cellkey === `${dateStr}__${highlightTime}`);
        if (target) {
          // scroll-snap-type:x mandatory 可能跟平滑捲動互相干擾；scrollIntoView() 更嚴重的問題是
          // 它會自己決定「該捲動哪一層祖先容器」，在某些手機瀏覽器上有機會捲過頭捲到 body 本身
          // （即使 body 設了 overflow:hidden），造成最上面的分頁列被推出畫面、卡住回不去。
          // 改成完全手動計算、只對這個 container 本身呼叫 scrollTo，不透過瀏覽器自動判斷，
          // 就不可能捲到這個容器以外的地方。
          const prevSnap = container.style.scrollSnapType;
          container.style.scrollSnapType = "none";
          const containerRect = container.getBoundingClientRect();
          const targetRect = target.getBoundingClientRect();
          const deltaTop = targetRect.top - containerRect.top - containerRect.height / 2 + targetRect.height / 2;
          container.scrollTo({ top: container.scrollTop + deltaTop, behavior: "smooth" });
          target.style.outline = "2px solid #2ed9c3";
          setTimeout(() => { target.style.outline = ""; }, 2500);
          setTimeout(() => {
            if (container) container.style.scrollSnapType = prevSnap;
          }, 700);
        }
      }, 300);
    }, 500);

  const findNearestOpenSlot = async () => {

    setFindingSlot(true);
    try {
      const now = getTaipeiNow();
      const todayStr = fmtDate(now.getFullYear(), now.getMonth(), now.getDate());
      const endD = new Date(now); endD.setDate(endD.getDate() + 60);
      const endStr = fmtDate(endD.getFullYear(), endD.getMonth(), endD.getDate());
      const { data, error } = await sb.from("bookings").select("date,start_time")
        .eq("master_id", master.id).gte("date", todayStr).lte("date", endStr)
        .neq("status", "cancelled").neq("status", "no_show").neq("color_tag", "vacation");
      if (error) { msg("查詢失敗，請再試", true); setFindingSlot(false); return; }
      const taken = new Set((data || []).map(b => `${b.date}_${(b.start_time || "").slice(0, 5)}`));
      const restSet = restOf(master.id);
      const nowMinutes = now.getHours() * 60 + now.getMinutes();
      let found = null;
      for (let off = 0; off <= 60 && !found; off++) {
        const d = new Date(now); d.setDate(d.getDate() + off);
        const dateStr = fmtDate(d.getFullYear(), d.getMonth(), d.getDate());
        for (const t of TIMES) {
          if (off === 0) {
            const [hh, mm] = t.split(":").map(Number);
            if (hh * 60 + mm <= nowMinutes) continue;
          }
          if (restSet.has(t)) continue;
          if (taken.has(`${dateStr}_${t}`)) continue;
          found = { date: dateStr, time: t };
          break;
        }
      }
      setFindingSlot(false);
      if (!found) { msg("接下來 60 天內都排滿了，請手動確認", true); return; }
      const wk = ["日", "一", "二", "三", "四", "五", "六"];
      const dObj = new Date(found.date + "T00:00:00");
      msg(`✓ 最近空檔：${found.date}（週${wk[dObj.getDay()]}）${found.time}`);
      jumpToDate(found.date, found.time);

      setFindingSlot(false);
